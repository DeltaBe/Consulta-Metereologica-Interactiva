<!DOCTYPE html>
<html>
<head>
    <style>
        @page { size: a4 portrait; margin: 2cm; }
        body { font-family: Helvetica, sans-serif; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #2a5298; padding-bottom: 10px; }
        .titulo { color: #1e3c72; font-size: 24px; margin-top: 20px; }
        .info { margin-top: 10px; font-size: 12px; color: #666; }
        .chart-box { text-align: center; margin-top: 30px; }
        .footer { position: absolute; bottom: 0; text-align: center; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <div class="titulo">{{ titulo }}</div>
        <div class="info">Mes de consulta: {{ mes }} | Generado el: {{ fecha_reporte }}</div>
    </div>

    <div class="chart-box">
        <img src="data:image/png;base64,{{ grafico }}" style="width: 100%;">
    </div>

    <div class="footer">
        Este documento es un reporte automático generado por Meteo-Analytics Argentina 2023.
    </div>
</body>
</html>
